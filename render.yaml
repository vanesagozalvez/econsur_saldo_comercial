services:
  - type: web
    name: econsur-saldo-comercial
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
    disk:
      name: data-disk
      mountPath: /opt/render/project/src/data
      sizeGB: 2
